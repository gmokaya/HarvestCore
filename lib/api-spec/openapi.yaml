openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HarvestCore API - Commodity-backed tokenization and lending platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and identity
  - name: users
    description: User management and KYC
  - name: inventory
    description: Inventory and logistics
  - name: tokens
    description: Tokenization and blockchain
  - name: loans
    description: Credit and lending
  - name: marketplace
    description: Trade and marketplace
  - name: settlement
    description: Settlement and liquidation
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ─────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  # ── USERS / KYC ──────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [farmer, warehouse_op, checker, lender, admin]
        - name: kycStatus
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/kyc:
    post:
      operationId: submitKyc
      tags: [users]
      summary: Submit KYC documents
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycSubmitRequest"
      responses:
        "200":
          description: KYC submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycRecord"
    get:
      operationId: getKyc
      tags: [users]
      summary: Get KYC record for user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: KYC record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycRecord"

  /users/{userId}/kyc/approve:
    post:
      operationId: approveKyc
      tags: [users]
      summary: Approve KYC (Admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: KYC approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycRecord"

  /users/{userId}/kyc/reject:
    post:
      operationId: rejectKyc
      tags: [users]
      summary: Reject KYC (Admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
              required: [reason]
      responses:
        "200":
          description: KYC rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycRecord"

  # ── INVENTORY / LOGISTICS ──────────────────────────────────
  /inventory/intakes:
    get:
      operationId: listIntakes
      tags: [inventory]
      summary: List all intake records
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, graded, weighed, verified, anchored, rejected]
        - name: warehouseId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of intakes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeListResponse"
    post:
      operationId: createIntake
      tags: [inventory]
      summary: Create a new intake record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntakeRequest"
      responses:
        "201":
          description: Intake created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeRecord"

  /inventory/intakes/{intakeId}:
    get:
      operationId: getIntake
      tags: [inventory]
      summary: Get intake record
      parameters:
        - name: intakeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intake record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeRecord"
    patch:
      operationId: updateIntake
      tags: [inventory]
      summary: Update intake (grade/weight)
      parameters:
        - name: intakeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntakeRequest"
      responses:
        "200":
          description: Updated intake
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeRecord"

  /inventory/intakes/{intakeId}/approve:
    post:
      operationId: approveIntake
      tags: [inventory]
      summary: Checker approves intake (Maker-Checker)
      parameters:
        - name: intakeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intake approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeRecord"

  /inventory/intakes/{intakeId}/reject:
    post:
      operationId: rejectIntake
      tags: [inventory]
      summary: Checker rejects intake
      parameters:
        - name: intakeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
              required: [reason]
      responses:
        "200":
          description: Intake rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeRecord"

  /inventory/warehouses:
    get:
      operationId: listWarehouses
      tags: [inventory]
      summary: List warehouses
      responses:
        "200":
          description: List of warehouses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarehouseListResponse"

  # ── TOKENS ────────────────────────────────────────────────
  /tokens:
    get:
      operationId: listTokens
      tags: [tokens]
      summary: List tokens
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [free, pledged, financed, locked, in_liquidation, released]
        - name: ownerId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenListResponse"

  /tokens/{tokenId}:
    get:
      operationId: getToken
      tags: [tokens]
      summary: Get token by ID
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"

  /tokens/{tokenId}/mint:
    post:
      operationId: mintToken
      tags: [tokens]
      summary: Mint NFT for verified intake
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token minted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"

  /tokens/{tokenId}/transfer:
    post:
      operationId: transferToken
      tags: [tokens]
      summary: Transfer token to new owner (Free only)
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                toUserId:
                  type: string
              required: [toUserId]
      responses:
        "200":
          description: Transfer successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"

  # ── LOANS ──────────────────────────────────────────────────
  /loans:
    get:
      operationId: listLoans
      tags: [loans]
      summary: List loans
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, active, repaid, defaulted, in_liquidation]
        - name: borrowerId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Loans list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanListResponse"
    post:
      operationId: createLoanRequest
      tags: [loans]
      summary: Submit a loan request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoanRequest"
      responses:
        "201":
          description: Loan request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{loanId}:
    get:
      operationId: getLoan
      tags: [loans]
      summary: Get loan details
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Loan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{loanId}/approve:
    post:
      operationId: approveLoan
      tags: [loans]
      summary: Approve loan (Lender)
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveLoanRequest"
      responses:
        "200":
          description: Loan approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{loanId}/reject:
    post:
      operationId: rejectLoan
      tags: [loans]
      summary: Reject loan
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
              required: [reason]
      responses:
        "200":
          description: Loan rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{loanId}/repay:
    post:
      operationId: repayLoan
      tags: [loans]
      summary: Record a repayment
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepaymentRequest"
      responses:
        "200":
          description: Repayment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{loanId}/ltv:
    get:
      operationId: getLoanLtv
      tags: [loans]
      summary: Get current LTV for a loan
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: LTV details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LtvReport"

  /loans/{loanId}/risk:
    get:
      operationId: getLoanRisk
      tags: [loans]
      summary: Get risk profile for borrower
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Risk profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskProfile"

  # ── MARKETPLACE ────────────────────────────────────────────
  /marketplace/listings:
    get:
      operationId: listMarketplaceListings
      tags: [marketplace]
      summary: List commodity listings
      parameters:
        - name: commodity
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, sold, cancelled, expired]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingListResponse"
    post:
      operationId: createListing
      tags: [marketplace]
      summary: Create a commodity listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingRequest"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /marketplace/listings/{listingId}:
    get:
      operationId: getListing
      tags: [marketplace]
      summary: Get listing detail
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /marketplace/listings/{listingId}/bids:
    get:
      operationId: listBids
      tags: [marketplace]
      summary: Get bids on a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidListResponse"
    post:
      operationId: placeBid
      tags: [marketplace]
      summary: Place a bid
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBidRequest"
      responses:
        "201":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"

  /marketplace/financing-requests:
    get:
      operationId: listFinancingRequests
      tags: [marketplace]
      summary: List financing requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, funded, closed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Financing requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancingRequestListResponse"

  /marketplace/prices:
    get:
      operationId: getMarketPrices
      tags: [marketplace]
      summary: Get real-time commodity prices
      responses:
        "200":
          description: Market prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketPricesResponse"

  # ── SETTLEMENT ─────────────────────────────────────────────
  /settlement/defaulted-loans:
    get:
      operationId: listDefaultedLoans
      tags: [settlement]
      summary: List defaulted/at-risk loans
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [at_risk, grace_period, notice_sent, for_sale, settled]
      responses:
        "200":
          description: Defaulted loans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefaultedLoanListResponse"

  /settlement/{loanId}/initiate:
    post:
      operationId: initiateSettlement
      tags: [settlement]
      summary: Initiate liquidation process
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementRecord"

  /settlement/{loanId}/waterfall:
    get:
      operationId: getWaterfallCalculation
      tags: [settlement]
      summary: Calculate settlement waterfall distribution
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
        - name: salePrice
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Waterfall breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterfallBreakdown"

  /settlement/{loanId}/finalize:
    post:
      operationId: finalizeSettlement
      tags: [settlement]
      summary: Finalize settlement after sale
      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeSettlementRequest"
      responses:
        "200":
          description: Settlement finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementRecord"

  # ── DASHBOARD ──────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard overview statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent platform activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityFeedResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── AUTH ─────────────────────────────────────────────────
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    # ── USER ─────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [farmer, warehouse_op, checker, lender, admin]
        orgId:
          type: string
          nullable: true
        kycStatus:
          type: string
          enum: [pending, approved, rejected]
        phone:
          type: string
          nullable: true
        walletAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, role, kycStatus, createdAt]

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [users, total, page, limit]

    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [farmer, warehouse_op, checker, lender, admin]
        password:
          type: string
        phone:
          type: string
        orgId:
          type: string
      required: [email, name, role, password]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        walletAddress:
          type: string
        orgId:
          type: string

    KycSubmitRequest:
      type: object
      properties:
        kycType:
          type: string
          enum: [individual, company, cooperative]
        idNumber:
          type: string
        idType:
          type: string
          enum: [national_id, passport, driving_license]
        businessName:
          type: string
          nullable: true
        kraPin:
          type: string
          nullable: true
        documentUrls:
          type: array
          items:
            type: string
      required: [kycType, idNumber, idType]

    KycRecord:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        kycType:
          type: string
          enum: [individual, company, cooperative]
        idNumber:
          type: string
        idType:
          type: string
        businessName:
          type: string
          nullable: true
        kraPin:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        rejectionReason:
          type: string
          nullable: true
        documentUrls:
          type: array
          items:
            type: string
        submittedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, userId, kycType, idNumber, idType, status, documentUrls, submittedAt]

    # ── INVENTORY ────────────────────────────────────────────
    Warehouse:
      type: object
      properties:
        id:
          type: string
        name:
